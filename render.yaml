services:
  - type: web
    name: FAG-INVENIO
    runtime: python
    buildCommand: |
      apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libffi-dev libjpeg-dev libopenjp2-7
      pip install -e ".[dev]"
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
